<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0e1621; color: white; padding: 20px; }
        .box { background: #17212b; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-trade { background: #2481cc; color: white; }
    </style>
</head>
<body>
    <h3>Dashboard Trading</h3>
    
    <div class="box">
        <label>Pair</label>
        <select id="pair" style="width:100%; padding:10px;">
            <option value="XAUUSD">XAUUSD</option>
            <option value="BTCUSD">BTCUSD</option>
        </select>
        <button class="btn-trade" onclick="kirimTrade()">KIRIM TRADE</button>
    </div>

    <script>
        Telegram.WebApp.ready();
        function kirimTrade() {
            let pair = document.getElementById("pair").value;
            // Getaran agar tahu tombol diklik
            Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            // Mengirim data
            Telegram.WebApp.sendData("TRADE_" + pair);
            alert("Data Trade " + pair + " Terkirim!");
            Telegram.WebApp.close();
        }
    </script>
</body>
</html>
