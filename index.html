<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e14; color: #fff; margin: 0; padding: 10px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 22%; padding: 8px; background: #1f2630; border: none; color: #888; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 11px; text-align: center; }
        .tab-btn.active { background: #2962ff; color: #fff; }
        .content { display: none; } .content.active { display: block; }
        .live-panel { background: #17212b; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 10px; border: 1px solid #363c4e; }
        .live-price { font-size: 24px; font-weight: bold; color: #e0e0e0; margin: 5px 0; }
        .pnl-box { font-size: 20px; font-weight: bold; padding: 10px; border-radius: 5px; background: #0b0e14; margin-top: 5px; }
        .pnl-green { color: #089981; } .pnl-red { color: #f23645; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; background: #242f3d; color: white; border: 1px solid #363c4e; border-radius: 5px; box-sizing: border-box; }
        button.action-btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        .buy { background: #089981; } .sell { background: #f23645; } .blue { background: #1976d2; }
        .trade-row { display: flex; gap: 5px; margin-top: 5px; }
        .trade-row button, .trade-row input { flex: 1; margin: 0; }
        h4 { margin: 15px 0 10px 0; border-bottom: 1px solid #363c4e; padding-bottom: 5px; font-size: 13px; }
        .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 5px;}
        .edu-btn { padding: 8px; font-size: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; height: 100%; min-height: 40px; }
        .bg-red { background: #d32f2f; } .bg-orange { background: #f57c00; } .bg-green { background: #388e3c; } .bg-blue { background: #1976d2; } .bg-purple { background: #6a1b9a; } .bg-dark { background: #37474f; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('main', this)">📈 Trade</button>
        <button class="tab-btn" onclick="showTab('news', this)">📅 Kalender</button>
        <button class="tab-btn" onclick="showTab('edu', this)">📚 Edukasi</button>
        <button class="tab-btn" onclick="showTab('combo', this)">🔄 Combo</button>
    </div>
    <div id="main" class="content active">
        <div class="live-panel"><div id="status-text">Menunggu Market...</div><div class="live-price" id="live-price">Memuat...</div><div class="pnl-box" id="pnl-display">Floating: $0.00</div></div>
        <div id="tv-chart" style="height:250px; margin-bottom:10px;"></div>
        <select id="pair" onchange="changePair()"><option value="PAXGUSDT">XAUUSD</option><option value="BTCUSDT">BTCUSDT</option><option value="EURUSDT">EURUSD</option></select>
        <input type="number" id="lot" step="0.01" value="0.1">
        <div class="trade-row"><button class="action-btn buy" onclick="execTrade('BUY')">BUY</button><button class="action-btn sell" onclick="execTrade('SELL')">SELL</button></div>
        <button class="action-btn" onclick="execClose()" style="background:#ffa000; color:black;">🔴 TUTUP POSISI</button>
    </div>
    <div id="news" class="content">
        <div style="background: #17212b; padding: 10px; border-radius: 8px;">
            <input type="text" id="newsName" placeholder="Kopas Penjelasan Berita">
            <div class="trade-row"><input type="text" id="newsAct" placeholder="Aktual"><input type="text" id="newsPrev" placeholder="Prev"><input type="text" id="newsFore" placeholder="Fore"></div>
            <div class="trade-row"><button class="action-btn blue" onclick="processNews('TRANSLATE')">🔤 TRANSLATE</button><button class="action-btn buy" onclick="processNews('ANALYZE')">🤖 ANALISIS</button></div>
        </div>
    </div>
    <div id="edu" class="content">
        <h4 style="color:#ef5350;">1. Bank Sentral</h4><div class="edu-grid"><button class="edu-btn bg-red" onclick="reqAction('EDUKASI', 'Suku Bunga (Fed/ECB/BOE)')">Suku Bunga</button><button class="edu-btn bg-red" onclick="reqAction('EDUKASI', 'FOMC Dot Plot')">Dot Plot</button></div>
        <h4 style="color:#ffb300;">2. Tenaga Kerja</h4><div class="edu-grid"><button class="edu-btn bg-orange" onclick="reqAction('EDUKASI', 'NFP')">NFP</button><button class="edu-btn bg-orange" onclick="reqAction('EDUKASI', 'Pengangguran')">Pengangguran</button></div>
        <h4 style="color:#ef5350;">3. Inflasi</h4><div class="edu-grid"><button class="edu-btn bg-red" onclick="reqAction('EDUKASI', 'CPI & Core CPI')">CPI & Core</button><button class="edu-btn bg-red" onclick="reqAction('EDUKASI', 'PCE & PPI')">PCE & PPI</button></div>
        <h4 style="color:#ffb300;">4. Ekonomi (GDP)</h4><div class="edu-grid"><button class="edu-btn bg-orange" onclick="reqAction('EDUKASI', 'GDP Flash/Prelim/Final')">GDP Lengkap</button></div>
    </div>
    <div id="combo" class="content"><div class="edu-grid"><button class="edu-btn bg-red" onclick="reqAction('COMBO_NEWS', 'NFP & AHE')">Paket NFP</button><button class="edu-btn bg-red" onclick="reqAction('COMBO_NEWS', 'CPI & Core')">Paket CPI</button></div></div>
    <script>
        Telegram.WebApp.ready(); Telegram.WebApp.expand();
        function reqAction(act, val) { Telegram.WebApp.sendData(JSON.stringify({ action: act, data: val })); }
        function processNews(tipe) { Telegram.WebApp.sendData(JSON.stringify({ action: tipe === 'TRANSLATE' ? 'TRANSLATE_NEWS' : 'CALENDAR_ANALYSIS', nama: document.getElementById("newsName").value, aktual: document.getElementById("newsAct").value, previous: document.getElementById("newsPrev").value, forecast: document.getElementById("newsFore").value })); }
        function showTab(t, e) { document.querySelectorAll('.content').forEach(c=>c.classList.remove('active')); document.getElementById(t).classList.add('active'); }
    </script>
</body>
</html>
