<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0e14; color: #fff; margin: 0; padding: 10px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px; background: #1f2630; border: none; color: #888; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: #2962ff; color: #fff; }
        .content { display: none; } .content.active { display: block; }
        
        /* Panel Demo Account */
        .demo-panel { background: #17212b; padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 10px; border: 1px solid #2962ff; }
        .demo-panel span { color: #aaa; font-size: 12px; }
        .demo-panel h2 { margin: 5px 0 0 0; color: #089981; font-size: 22px; }

        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #242f3d; color: white; border: 1px solid #363c4e; border-radius: 5px; box-sizing: border-box; }
        button.action-btn { width: 100%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .buy { background: #089981; } .sell { background: #f23645; }
        
        /* Layout tombol trade bersebelahan */
        .trade-row { display: flex; gap: 10px; margin-top: 5px; }
        .trade-row button { flex: 1; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('main')">📈 Trade</button>
        <button class="tab-btn" onclick="showTab('news')">📰 News AI</button>
    </div>

    <!-- TAB TRADE: CHART & GAME -->
    <div id="main" class="content active">
        <div class="demo-panel">
            <span>Saldo Demo Account</span>
            <h2>$10,000.00</h2>
        </div>
        
        <div id="tv-chart" style="height:320px; margin-bottom:10px;"></div>
        
        <select id="pair" onchange="updateChart()">
            <option value="XAUUSD">XAUUSD (Gold)</option>
            <option value="BTCUSD">BTCUSD (Bitcoin)</option>
            <option value="EURUSD">EURUSD (Euro)</option>
        </select>
        
        <div class="trade-row">
            <input type="number" id="lot" placeholder="Lot (Cth: 0.1)" step="0.01" style="width: 40%; margin: 0;">
            <button class="action-btn buy" onclick="execTrade('BUY')">BUY</button>
            <button class="action-btn sell" onclick="execTrade('SELL')">SELL</button>
        </div>
    </div>

    <!-- TAB NEWS: FILTER NEGARA -->
    <div id="news" class="content">
        <label style="font-size: 12px; color: #aaa;">Pilih Negara:</label>
        <select id="newsCountry">
            <option value="Amerika Serikat (US)">🇺🇸 Amerika Serikat (USD)</option>
            <option value="Eropa (Eurozone)">🇪🇺 Eropa (EUR)</option>
            <option value="Inggris (UK)">🇬🇧 Inggris (GBP)</option>
            <option value="Jepang">🇯🇵 Jepang (JPY)</option>
        </select>

        <label style="font-size: 12px; color: #aaa;">Tanggal & Topik:</label>
        <input type="date" id="newsDate">
        <input type="text" id="newsTopic" placeholder="Indikator (Cth: NFP, Suku Bunga)">
        
        <button class="action-btn" onclick="execNews()" style="background:#2962ff; margin-top: 10px;">ANALISIS BERITA NEGARA INI</button>
    </div>

    <script>
        Telegram.WebApp.ready();
        
        function showTab(t) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.currentTarget.classList.add('active');
            if(t === 'main') updateChart();
        }

        function updateChart() {
            document.getElementById("tv-chart").innerHTML = "";
            new TradingView.widget({
                "container_id": "tv-chart", 
                "symbol": "OANDA:" + document.getElementById("pair").value, 
                "theme": "dark", "autosize": true, "interval": "15"
            });
        }

        function execTrade(type) {
            let data = { 
                action: 'TRADE_DEMO', 
                type: type, 
                pair: document.getElementById("pair").value, 
                lot: document.getElementById("lot").value || "0.01"
            };
            Telegram.WebApp.sendData(JSON.stringify(data));
            Telegram.WebApp.close();
        }

        function execNews() {
            let data = { 
                action: 'NEWS_FILTER', 
                country: document.getElementById("newsCountry").value, 
                date: document.getElementById("newsDate").value, 
                topic: document.getElementById("newsTopic").value 
            };
            Telegram.WebApp.sendData(JSON.stringify(data));
            Telegram.WebApp.close();
        }

        updateChart();
    </script>
</body>
</html>
